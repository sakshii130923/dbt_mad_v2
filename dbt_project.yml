name: 'dbt_mad'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_mad'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  dbt_mad:
    staging:
      +materialized: view          # lightweight, no storage cost
      bubble:
        +schema: dev_staging_bubble
      crm:
        +schema: dev_staging_crm
    intermediate:
      +materialized: table         # persisted for join performance
      bubble:
        +schema: dev_intermediate_bubble
      crm:
        +schema: dev_intermediate_crm
    marts:
      core:
        +materialized: table       # persisted for query performance
        +schema: dev_marts         # output to 'dev_marts' schema
    prod:
      +materialized: table
      analytics:
        +schema: dev_prod_analytics  # dashboard analytics models
